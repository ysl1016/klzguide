name: Update Redeem Codes

on:
  schedule:
    # Run daily at 09:00 UTC (18:00 KST)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update-codes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run redeem code updater
        id: updater
        run: node scripts/update-redeem-codes.mjs --apply
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/redeem-codes.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true' && steps.updater.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/redeem-codes.json
          git commit -m "chore: verify redeem codes ($(date +%Y-%m-%d))"
          git push

      - name: Create issue on scraping failure
        if: steps.updater.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'redeem-code-scrape-failure',
              state: 'open',
            });
            if (existing.data.length > 0) {
              console.log('Issue already exists, skipping creation');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 리딤 코드 스크래핑 실패 — 수동 확인 필요',
              body: [
                '## 상황',
                '리딤 코드 자동 업데이트 스크래핑이 실패했습니다.',
                '',
                '## 가능한 원인',
                '- ldshop.gg 사이트 구조 변경',
                '- 사이트 일시적 장애',
                '- 코드 패턴 변경',
                '',
                '## 조치 필요',
                '1. [ldshop.gg 리딤 코드 페이지](https://www.ldshop.gg/blog/last-z/last-z-survival-shooter-codes.html) 직접 확인',
                '2. 사이트 구조가 변경되었으면 `scripts/update-redeem-codes.mjs` 수정',
                '3. `src/data/redeem-codes.json` 수동 업데이트',
                '',
                `**실패 시각:** ${new Date().toISOString()}`,
                `**Action Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['redeem-code-scrape-failure'],
            });
